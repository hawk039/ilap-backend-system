services:
  - name: ilap-backend-system
    type: web
    runtime: python
    plan: starter
    autoDeployTrigger: commit
    buildCommand: pip install -e ".[dev]"
    startCommand: sh scripts/render-start.sh
    healthCheckPath: /healthz
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: SEED_REFERENCE_DATA
        value: "true"
      - key: ENABLE_ADMIN_BOOTSTRAP
        value: "false"
      - key: DOCS_ENABLED
        value: "true"
      - key: AI_STUB_MODE
        value: "false"
      - key: REQUIRE_VERIFIED_EMAIL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ilap-backend-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: ilap-backend-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: AI_SERVICE_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: EMAIL_VERIFICATION_URL_TEMPLATE
        sync: false
      - key: PASSWORD_RESET_URL_TEMPLATE
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

databases:
  - name: ilap-backend-db
    plan: free
